<section class="hero" id="hero" aria-labelledby="hero-title">
  <div class="container hero-container">
    <div class="hero-content">
      <p class="hero-copy">
        Relaxing 3D puzzle gameplay packed with colorful collectibles.
      </p>
      <h1 id="hero-title">Match Toys.<br />Clear The Room.</h1>
    </div>

    <div class="hero-image-wrap">
      <img
        class="hero-image"
        src="./img/toy-room/hero.png"

    <a
